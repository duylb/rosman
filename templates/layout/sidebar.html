<aside class="sidebar layout-sidebar" aria-label="Primary Navigation">
  <div class="brand">
    <div class="brand-logo-box">
      <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        alt="{{ t('brand_name') }}"
        class="brand-logo"
        width="28"
        height="28"
      />
    </div>
    <div class="brand-copy">
      <p class="brand-name">{{ t('brand_name') }}</p>
      <p class="brand-sub">{{ t('brand_sub') }}</p>
    </div>
  </div>

  {% include "components/sidebar_nav.html" %}

  <div class="sidebar-footer">
    <div class="sidebar-branding">
      <p class="sidebar-branding-text">
        {{ t('brand_name') }}<br />
        {{ t('by_author').format(author=app_author) }}<br />
        {{ app_version }}
      </p>
    </div>
    <form method="post" action="{{ url_for('set_language') }}" class="lang-form lang-toggle">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="hidden" name="next" value="{{ request.full_path if request.query_string else request.path }}" />
      <button type="submit" name="lang" value="en" class="lang-toggle-btn {{ 'active' if lang == 'en' else '' }}" aria-label="Switch language to English">
        {% set name = 'arrows' %}
        {% set size = 14 %}
        {% include "components/icon.html" %}
        <span>EN</span>
      </button>
      <button type="submit" name="lang" value="vi" class="lang-toggle-btn {{ 'active' if lang == 'vi' else '' }}" aria-label="Switch language to Vietnamese">
        {% set name = 'arrows' %}
        {% set size = 14 %}
        {% include "components/icon.html" %}
        <span>VI</span>
      </button>
    </form>
  </div>
</aside>
