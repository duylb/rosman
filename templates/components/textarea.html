<label class="ui-field {{ field_class|default('') }}">
  {% if label %}<span class="ui-label">{{ label }}</span>{% endif %}
  <textarea
    class="ui-input ui-textarea {{ textarea_class|default('') }}"
    name="{{ name|default('') }}"
    {% if id %}id="{{ id }}"{% endif %}
    {% if rows %}rows="{{ rows }}"{% endif %}
    {% if required %}required{% endif %}
    {{ attrs|default('')|safe }}
  >{{ value|default('') }}</textarea>
</label>
