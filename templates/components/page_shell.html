<section class="page-shell {{ shell_class|default('') }}">
  <div class="u-flex u-justify-between u-items-center u-gap-3 u-flex-wrap">
    <div>
      <h2 class="page-section-title">{{ shell_title }}</h2>
      {% if shell_description %}<p class="page-description">{{ shell_description }}</p>{% endif %}
    </div>
    {% if shell_actions %}
    <div class="action-group">{{ shell_actions|safe }}</div>
    {% endif %}
  </div>
  {% if shell_toolbar %}
  <div class="app-toolbar panel">
    {{ shell_toolbar|safe }}
  </div>
  {% endif %}
  <div class="layout-stack">
    {{ shell_content|safe }}
  </div>
</section>
