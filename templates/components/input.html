{% set field_name = name|default('') %}
{% set field_label = label|default('') %}
<label class="ui-field {{ field_class|default('') }}">
  {% if field_label %}<span class="ui-label">{{ field_label }}</span>{% endif %}
  <input
    class="ui-input {{ input_class|default('') }}"
    {% if id %}id="{{ id }}"{% endif %}
    type="{{ input_type|default('text') }}"
    name="{{ field_name }}"
    {% if value is defined %}value="{{ value }}"{% endif %}
    {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
    {% if min is defined %}min="{{ min }}"{% endif %}
    {% if max is defined %}max="{{ max }}"{% endif %}
    {% if step is defined %}step="{{ step }}"{% endif %}
    {% if required %}required{% endif %}
    {% if readonly %}readonly{% endif %}
    {% if disabled %}disabled{% endif %}
    {{ attrs|default('')|safe }}
  />
</label>
