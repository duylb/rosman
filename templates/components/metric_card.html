<article class="ui-card metric-card {{ card_class|default('') }}">
  <div class="u-flex u-justify-between u-items-center u-gap-2">
    <h3 class="metric-title">{{ title }}</h3>
    {% if icon %}
    <span class="metric-badge">{% set name = icon %}{% include "components/icon.html" %}</span>
    {% endif %}
  </div>
  <p class="metric-value">{{ value }}</p>
  {% if subtitle %}<p class="metric-sub">{{ subtitle }}</p>{% endif %}
</article>
