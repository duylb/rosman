{% set icon_name = name|default('circle') %}
{% set icon_size = size|default(20) %}
<svg
  class="ui-icon {{ class_name|default('') }}"
  width="{{ icon_size }}"
  height="{{ icon_size }}"
  viewBox="0 0 24 24"
  fill="none"
  aria-hidden="true"
>
  {% if icon_name == 'dashboard' %}
    <rect x="3" y="3" width="8" height="8" rx="2"></rect>
    <rect x="13" y="3" width="8" height="5" rx="2"></rect>
    <rect x="13" y="10" width="8" height="11" rx="2"></rect>
    <rect x="3" y="13" width="8" height="8" rx="2"></rect>
  {% elif icon_name == 'staff' %}
    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
    <circle cx="9" cy="7" r="4"></circle>
    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
  {% elif icon_name == 'clock' %}
    <circle cx="12" cy="12" r="9"></circle>
    <path d="M12 7v6l4 2"></path>
  {% elif icon_name == 'calendar-check' %}
    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
    <path d="M16 2v4"></path>
    <path d="M8 2v4"></path>
    <path d="M3 10h18"></path>
    <path d="m9 16 2 2 4-4"></path>
  {% elif icon_name == 'calendar-days' %}
    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
    <path d="M16 2v4"></path>
    <path d="M8 2v4"></path>
    <path d="M3 10h18"></path>
    <path d="M8 14h.01"></path>
    <path d="M12 14h.01"></path>
    <path d="M16 14h.01"></path>
    <path d="M8 18h.01"></path>
    <path d="M12 18h.01"></path>
    <path d="M16 18h.01"></path>
  {% elif icon_name == 'wallet' %}
    <path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
    <path d="M3 10h18"></path>
    <circle cx="16.5" cy="14.5" r="1.5"></circle>
  {% elif icon_name == 'arrows' %}
    <path d="m17 3 4 4-4 4"></path>
    <path d="M3 7h18"></path>
    <path d="m7 21-4-4 4-4"></path>
    <path d="M21 17H3"></path>
  {% elif icon_name == 'shield-check' %}
    <path d="M12 3 4 7v6c0 5 3.4 7.74 8 9 4.6-1.26 8-4 8-9V7z"></path>
    <path d="m9 12 2 2 4-4"></path>
  {% elif icon_name == 'check' %}
    <path d="m5 12 4 4 10-10"></path>
  {% elif icon_name == 'plus' %}
    <path d="M12 5v14"></path>
    <path d="M5 12h14"></path>
  {% elif icon_name == 'download' %}
    <path d="M12 3v12"></path>
    <path d="m7 10 5 5 5-5"></path>
    <path d="M5 21h14"></path>
  {% elif icon_name == 'edit' %}
    <path d="M12 20h9"></path>
    <path d="m16.5 3.5 4 4L7 21H3v-4z"></path>
  {% elif icon_name == 'trash' %}
    <path d="M3 6h18"></path>
    <path d="M8 6V4h8v2"></path>
    <path d="M19 6l-1 14H6L5 6"></path>
  {% elif icon_name == 'calendar' %}
    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
    <path d="M16 2v4"></path>
    <path d="M8 2v4"></path>
    <path d="M3 10h18"></path>
  {% else %}
    <circle cx="12" cy="12" r="9"></circle>
  {% endif %}
</svg>
